<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SandDrop - Legal</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f8f9fb;
      color: #111827;
      display: grid;
      place-items: center;
      min-height: 100vh;
    }
    .card {
      width: min(92vw, 560px);
      background: #fff;
      border-radius: 12px;
      padding: 28px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      text-align: center;
    }
    h1 {
      margin-top: 0;
      margin-bottom: 10px;
    }
    p {
      color: #4b5563;
      margin-bottom: 24px;
    }
    .links {
      display: grid;
      gap: 12px;
    }
    a {
      display: block;
      text-decoration: none;
      background: #111827;
      color: #fff;
      padding: 12px 14px;
      border-radius: 8px;
      font-weight: 600;
    }
    a:hover {
      background: #1f2937;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>SandDrop Legal Pages</h1>
    <p>Use the links below to view our legal and FAQ pages.</p>
    <div class="links">
      <a href="/terms-and-conditions">Terms and Conditions</a>
      <a href="/privacy-policy">Privacy Policy</a>
      <a href="/faqs">FAQs</a>
    </div>
  </main>
</body>
</html>
